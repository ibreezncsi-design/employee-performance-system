<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>النتائج</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

<h2 class="mb-4">
    النتائج النهائية
</h2>

<table class="table table-bordered">

<thead>

<tr>
    <th>الترتيب</th>
    <th>الموظف</th>
    <th>النتيجة %</th>
</tr>

</thead>

<tbody>

{% for row in results %}

<tr>

    <td>{{ loop.index }}</td>

    <td>{{ row.name }}</td>

    <td>{{ row.score }}</td>

</tr>

{% endfor %}

</tbody>

</table>

<a href="/admin" class="btn btn-secondary">
    رجوع
</a>

</div>

</body>
</html>
